file_selection:
  filename_pattern: "НП_<year>_<file_label>.xls"
  file_label_rule: >-
    Это отображаемое наименование территории в имени файла, без кода ОКТМО,
    ОКАТО, ISO или другого машиночитаемого идентификатора. Не выводить код
    территории из имени эвристически; сохранять file_label как исходную строку.
  geography_classes:
    subject: "Обычное наименование субъекта РФ, например «Томская область»"
    federal_district: "Верхний регистр и фраза «ФЕДЕРАЛЬНЫЙ ОКРУГ»"
    russian_federation_total: "РОССИЙСКАЯ ФЕДЕРАЦИЯ"
  primary_file_key: [year, file_label]
  workbook_scope_field: "file_label"

common_workbook_rules:
  worksheet_format: "BIFF8 .xls"
  hidden_worksheets: false
  hidden_columns_observed: false
  hidden_rows: >-
    Есть во многих листах; pandas/xlrd прочитает их. В частности, в 2024
    скрыты служебные строки Раздел4, Раздел5 и Раздел10, а в 2014 — также
    служебные строки Раздел1, Раздел4, Раздел5, Раздел7, Раздел9 и Раздел10.
  cell_types_observed:
    - string
    - number
    - empty
  dates_observed_as_excel_date_cells: false
  missing_markers:
    - "пустая ячейка"
    - "X"
    - "- (главным образом в листах 2014 года)"
  row_code_rule: >-
    «Код строки» — внутренний код строки шаблона паспорта, а не опубликованный
    классификатор налогов, ОКВЭД, ОКТМО или КБК. Нормализовать к строке,
    сохраняя десятичные коды (например, 530.1) и отрицательные служебные коды.
  hierarchy_rule: >-
    Строки «в том числе:», «из них:», «Справочно:» и строки с пустым «Кодом
    строки» — заголовки/контекст, не самостоятельные наблюдения. Для плоской
    таблицы брать строки с непустым row_code и отдельно сохранять иерархию
    индикаторов, если она нужна для интерпретации.
  default_logical_key: [year, file_label, sheet_name, row_code]
  key_caveat: >-
    Ключ применим только внутри одного годового шаблона и листа. Код строки
    меняет смысл при переносе разделов между годами; нельзя соединять листы
    только по row_code.

layouts:
  annual_indicator:
    grain: "Один индикатор шаблона паспорта в территории и году"
    columns:
      - {source_header: "ПОКАЗАТЕЛЬ", normalized_name: indicator_label, type: string, unit: "зависит от текста показателя"}
      - {source_header: "Код строки", normalized_name: row_code, type: "string after normalisation", unit: null}
      - {source_header: "<YYYY> год", normalized_name: value_yyyy, type: "number|string", unit: "в тексте показателя либо не указан"}
      - {source_header: "В % к предыдущему году", normalized_name: pct_to_previous_year, type: "number|string", unit: "%"}
  budget_receipts:
    grain: "Вид администрируемого дохода в территории и году"
    columns:
      - {source_header_path: "ПОКАЗАТЕЛЬ", normalized_name: indicator_label, type: string}
      - {source_header_path: "Код строки", normalized_name: row_code, type: "string after normalisation"}
      - {source_header_path: "Поступило в консолидированный бюджет Российской Федерации → Всего", normalized_name: consolidated_budget_rf_total, type: "number|string"}
      - {source_header_path: "Поступило в консолидированный бюджет Российской Федерации → В % к предыдущему периоду", normalized_name: consolidated_budget_rf_pct_prev_period, type: "number|string", unit: "%"}
      - {source_header_path: "Поступило в консолидированный бюджет Российской Федерации → Удельный вес (%)", normalized_name: consolidated_budget_rf_share_pct, type: "number|string", unit: "%"}
      - {source_header_path: "в том числе → В федеральный бюджет → Всего", normalized_name: federal_budget_total, type: "number|string"}
      - {source_header_path: "в том числе → В федеральный бюджет → В % к предыдущему периоду", normalized_name: federal_budget_pct_prev_period, type: "number|string", unit: "%"}
      - {source_header_path: "в том числе → В федеральный бюджет → Удельный вес (%)", normalized_name: federal_budget_share_pct, type: "number|string", unit: "%"}
      - {source_header_path: "в том числе → В консолидированный бюджет субъекта РФ → Всего", normalized_name: subject_consolidated_budget_total, type: "number|string"}
      - {source_header_path: "в том числе → В консолидированный бюджет субъекта РФ → В % к предыдущему периоду", normalized_name: subject_consolidated_budget_pct_prev_period, type: "number|string", unit: "%"}
      - {source_header_path: "в том числе → В консолидированный бюджет субъекта РФ → Удельный вес (%)", normalized_name: subject_consolidated_budget_share_pct, type: "number|string", unit: "%"}
      - {source_header_path: "из него → В местный бюджет → Всего", normalized_name: local_budget_total, type: "number|string"}
      - {source_header_path: "из него → В местный бюджет → В % к предыдущему периоду", normalized_name: local_budget_pct_prev_period, type: "number|string", unit: "%"}

sheet_profiles:
  "ТИТУЛ":
    kind: metadata_form
    grain: "Одна книга"
    fields_by_cell_anchor:
      - {source_label: "ПО СОСТОЯНИЮ НА DD.MM.YYYY", normalized_name: snapshot_as_of_text, type: string}
      - {source_label: "СУБЪЕКТ РОССИЙСКОЙ ФЕДЕРАЦИИ", normalized_name: territory_display_name, type: string}
      - {source_label: "ОБЛАСТНОЙ (РЕСПУБЛИКАНСКИЙ, КРАЕВОЙ) ЦЕНТР", normalized_name: regional_centre, type: string}
      - {source_label: "ФЕДЕРАЛЬНЫЙ ОКРУГ", normalized_name: federal_district_display_name, type: string}
      - {source_label: "КОД УПРАВЛЕНИЯ ФНС РОССИИ", normalized_name: fns_administration_code, type: "number|string"}
    caveat: "Это анкета с merged cells, а не строковая таблица; якоря различаются по типу территории."
  "Содержание":
    kind: navigation
    grain: "Одна строка на лист паспорта"
    columns:
      - {source_header: "имя листа, например Раздел5", normalized_name: sheet_name, type: string}
      - {source_header: "текст назначения", normalized_name: sheet_title, type: string}
  "Руководители":
    kind: personal_data_table
    present_in: "Во всех региональных и окружных книгах; отсутствует в книге РФ"
    header_rows:
      - "ПОКАЗАТЕЛЬ"
      - "Код строки"
      - "Фамилия, имя, отчество"
      - "Адрес → почтовый"
      - "Адрес → электронной почты"
      - "Код и номер → телефона"
      - "Код и номер → факса"
    contains_personal_data: true
    machine_processing_rule: "Не выгружать и не публиковать без отдельного правового основания и политики ПДн."

