join_and_aggregation_rules:
  safe_within_sheet: "[year, file_label, sheet_name, row_code] после исключения контекстных строк"
  cross_year: >-
    Сначала сопоставить sheet title, текст показателя, единицу и смысл столбца.
    Номер раздела и row_code сами по себе недостаточны: разделы 6–12 были
    перераспределены между 2014 и 2024.
  cross_file: >-
    Книги федеральных округов и РФ — готовые агрегаты, а не строки для
    присоединения к субъектам. Не суммировать их с субъектами и не считать
    одновременно РФ, округи и субъекты одной совокупностью.
  totals: >-
    Внутри листов встречаются «ВСЕГО», «в том числе», «из него» и отраслевые
    детализации. Не суммировать строки без проверки отношений вложенности;
    видимые итоги уже могут включать детализацию. Отрицательные значения
    встречаются в поступлениях и изменениях.
  missing_values: >-
    «X», «-» и пустая ячейка не равны нулю. Сохранять их как отдельный
    missing_reason/исходный текст до решения о допустимой подстановке.
