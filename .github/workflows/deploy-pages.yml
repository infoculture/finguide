# Публикует Docusaurus на GitHub Pages (источник: GitHub Actions).
# Публичный URL: https://infoculture.github.io/finguide/
name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: github.repository == 'infoculture/finguide' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No duplicate Docusaurus config (canonical .ts only)
        run: |
          if test -f docusaurus.config.js; then echo '::error::Remove docusaurus.config.js — use docusaurus.config.ts only.'; exit 1; fi
          if test -f sidebars.js; then echo '::error::Remove sidebars.js — use sidebars.ts only.'; exit 1; fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.repository == 'infoculture/finguide' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
