name: External links (weekly)

on:
  schedule:
    - cron: '27 5 * * 1'
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 4
            --exclude-mail
            --timeout 25
            './wiki/**/*.md'
            './README.md'
            './CONTRIBUTING.md'
            './AGENTS.md'
            './KNOWLEDGE.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
